---
# ============================================================
# Playbook: unix_automation.yaml
# Automação Unix — POC Claro HashiCorp
#
# As credenciais (ansible_user / ansible_password / ansible_become_password)
# são injetadas automaticamente pelo AAP via credencial do tipo Machine,
# integrada ao HashiCorp Vault.
# ============================================================
- name: Automação Unix — POC Claro HashiCorp
  hosts: "{{ target_host | default('10.10.10.7') }}"
  gather_facts: true
  become: true

  tasks:
    - name: Executar automação Unix via role
      ansible.builtin.include_role:
        name: unix_server
